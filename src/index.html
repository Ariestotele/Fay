<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="heart"></canvas>

    <div class="hud">
      <div class="brand" id="brand">FAY</div>

      <button class="core" id="core" aria-label="Open Fay"></button>
      <div class="clock" id="clock">--:--</div>

      <div class="deck" id="deck">
        <section class="group">
          <h2 class="group__label">scenes</h2>
          <div class="grid" id="scenes"></div>
        </section>
        <section class="group">
          <h2 class="group__label">apps</h2>
          <div class="grid" id="apps"></div>
        </section>
      </div>
    </div>

    <footer class="foot">
      <span id="status">ready</span>
      <span id="monitors"></span>
    </footer>

    <script src="heart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
